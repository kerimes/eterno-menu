<!DOCTYPE html>
<html lang="tr">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #FAF7F2; --espresso: #1C120A; --mocha: #6B3F1A;
      --latte: #C49A6C; --foam: #EDE8DF; --accent: #D4622A;
      --card-bg: #FFFFFF; --shadow: 0 2px 16px rgba(28,18,10,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--espresso); min-height: 100vh; }

    header { background: var(--espresso); color: #fff; padding: 18px 16px 14px; text-align: center; position: sticky; top: 0; z-index: 100; }
    header h1 { font-family: 'Playfair Display', serif; font-size: 1.45rem; letter-spacing: 0.02em; }
    header p { font-size: 0.72rem; opacity: 0.55; margin-top: 2px; letter-spacing: 0.08em; text-transform: uppercase; }

    #category-bar { display: flex; overflow-x: auto; padding: 10px 14px; gap: 8px; background: var(--foam); border-bottom: 1px solid #e8e1d6; scrollbar-width: none; }
    #category-bar::-webkit-scrollbar { display: none; }
    .cat-btn { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(--latte); background: transparent; color: var(--mocha); font-family: 'DM Sans', sans-serif; font-size: 0.79rem; font-weight: 500; cursor: pointer; transition: all 0.18s; white-space: nowrap; }
    .cat-btn.active, .cat-btn:hover { background: var(--mocha); color: #fff; border-color: var(--mocha); }

    #menu-container { padding: 14px 14px 100px; display: flex; flex-direction: column; gap: 22px; }
    .category-section h2 { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--mocha); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--latte); }
    .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 10px; }

    .menu-card { background: var(--card-bg); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; transition: transform 0.15s; }
    .menu-card:active { transform: scale(0.97); }
    .card-img-wrap { width: 100%; aspect-ratio: 4/3; background: var(--foam); overflow: hidden; }
    .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-img-wrap .no-img-icon { width: 100%; aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; }
    .card-body { padding: 9px 11px 11px; }
    .item-name { font-weight: 500; font-size: 0.84rem; line-height: 1.3; margin-bottom: 6px; }
    .item-footer { display: flex; align-items: flex-end; justify-content: space-between; gap: 4px; }
    .price-wrap { display: flex; flex-direction: column; }
    .item-old-price { font-size: 0.66rem; color: #bbb; text-decoration: line-through; line-height: 1; }
    .item-price { font-weight: 700; font-size: 0.94rem; color: var(--mocha); }
    .add-btn { width: 28px; height: 28px; border-radius: 50%; background: var(--espresso); color: #fff; border: none; font-size: 1.2rem; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s; flex-shrink: 0; }
    .add-btn:hover { background: var(--mocha); }

    #cart-bar { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--espresso); color: #fff; padding: 13px 18px; cursor: pointer; z-index: 200; align-items: center; justify-content: space-between; box-shadow: 0 -4px 20px rgba(0,0,0,0.15); }
    .cart-left { display: flex; align-items: center; gap: 10px; }
    .cart-count { background: var(--accent); border-radius: 50%; width: 24px; height: 24px; font-size: 0.78rem; font-weight: 700; display: flex; align-items: center; justify-content: center; }
    .cart-label { font-size: 0.9rem; font-weight: 500; }
    .cart-total-disp { font-weight: 700; font-size: 0.95rem; }

    #cart-modal { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.45); align-items: flex-end; }
    #cart-modal.open { display: flex; }
    .cart-sheet { background: var(--cream); width: 100%; border-radius: 20px 20px 0 0; padding: 20px 16px 40px; max-height: 88vh; overflow-y: auto; animation: slideUp 0.25s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: none; } }
    .cart-sheet h3 { font-family: 'Playfair Display', serif; font-size: 1.15rem; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
    .close-btn { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--espresso); }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--foam); gap: 10px; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-weight: 500; font-size: 0.86rem; }
    .cart-item-price { font-size: 0.76rem; color: #888; margin-top: 2px; }
    .qty-controls { display: flex; align-items: center; gap: 8px; }
    .qty-btn { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--latte); background: transparent; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .qty-btn:hover { background: var(--foam); }
    .qty-num { font-weight: 600; min-width: 18px; text-align: center; font-size: 0.9rem; }

    .order-form label { display: block; font-size: 0.77rem; font-weight: 500; color: var(--mocha); margin-bottom: 4px; margin-top: 13px; }
    .order-form input, .order-form textarea { width: 100%; padding: 9px 13px; border: 1.5px solid #ddd; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.86rem; background: #fff; color: var(--espresso); outline: none; transition: border-color 0.15s; -webkit-appearance: none; }
    .order-form input:focus, .order-form textarea:focus { border-color: var(--mocha); }
    .order-form textarea { resize: none; min-height: 65px; }
    .type-toggle { display: flex; gap: 8px; margin-top: 4px; }
    .type-btn { flex: 1; padding: 9px; border: 1.5px solid #ddd; border-radius: 10px; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 0.81rem; cursor: pointer; transition: all 0.15s; color: var(--espresso); }
    .type-btn.selected { background: var(--espresso); color: #fff; border-color: var(--espresso); }
    #masa-row, #adres-row { display: none; }
    .total-row { display: flex; justify-content: space-between; margin-top: 14px; padding-top: 11px; border-top: 1.5px solid var(--latte); font-weight: 700; font-size: 1rem; }
    .submit-btn { width: 100%; margin-top: 14px; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 13px; font-family: 'Playfair Display', serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; letter-spacing: 0.02em; transition: background 0.15s; }
    .submit-btn:hover { background: #b84e1e; }
    .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

    #voice-wrap { position: fixed; bottom: 86px; right: 14px; display: flex; flex-direction: column; align-items: center; gap: 5px; z-index: 150; }
    #voice-label { background: rgba(28,18,10,0.78); color: #fff; font-size: 0.64rem; padding: 3px 9px; border-radius: 20px; white-space: nowrap; pointer-events: none; }
    #voice-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--mocha); color: #fff; border: none; font-size: 1.3rem; cursor: pointer; box-shadow: 0 4px 14px rgba(107,63,26,0.35); display: flex; align-items: center; justify-content: center; transition: background 0.15s, transform 0.15s; }
    #voice-btn:hover { transform: scale(1.06); }
    #voice-btn.listening { background: var(--accent); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    #voice-status { position: fixed; bottom: 148px; right: 14px; background: rgba(28,18,10,0.88); color: #fff; padding: 7px 13px; border-radius: 18px; font-size: 0.75rem; display: none; z-index: 151; max-width: 210px; text-align: right; }

    #success-screen { display: none; position: fixed; inset: 0; background: var(--cream); z-index: 400; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
    #success-screen .check { font-size: 3.5rem; margin-bottom: 14px; }

    #success-screen .new-order-btn { margin-top: 26px; padding: 13px 30px; background: var(--espresso); color: #fff; border: none; border-radius: 11px; font-family: 'DM Sans', sans-serif; font-size: 0.92rem; cursor: pointer; }
  </style>
</head>

<header>

<div id="cart-modal">

</div>

<div id="success-screen">

};

/* ── STATE ── */
let menuData = {}, cart = [], orderType = 'masa', recognition = null;

document.addEventListener('DOMContentLoaded', () => { loadMenu(); initVoice(); });

async function loadMenu() {
  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 5000);
    const res = await fetch(`${CONFIG.MENU_WEBHOOK}?client_id=${CLIENT_ID}`, { signal: ctrl.signal });
    clearTimeout(t);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    document.getElementById('biz-adi').textContent    = data.business_name || 'Ortaköy Kuru Fasulyecisi';
    document.getElementById('biz-slogan').textContent = data.slogan || '';
    menuData = data.menu || STATIC_MENU;
  } catch (e) {
    menuData = STATIC_MENU;
  }
  renderCategories();
  renderMenu();
}

function renderCategories() {
  const bar = document.getElementById('category-bar');
  bar.innerHTML = '';
  Object.keys(menuData).forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (i === 0 ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('cat-' + slugify(cat))?.scrollIntoView({ behavior:'smooth', block:'start' });
    };
    bar.appendChild(btn);
  });
}

function renderMenu() {
  const container = document.getElementById('menu-container');
  container.innerHTML = '';
  Object.entries(menuData).forEach(([cat, items]) => {
    const active = items.filter(i => i.active !== false);
    if (!active.length) return;
    const sec = document.createElement('div');
    sec.className = 'category-section';
    sec.id = 'cat-' + slugify(cat);
    sec.innerHTML = `<h2>${escHtml(cat)}</h2>`;
    const grid = document.createElement('div');
    grid.className = 'items-grid';
    active.forEach(item => {
      const card = document.createElement('div');
      card.className = 'menu-card';
      const imgUrl = item.img || item.image || '';
      const imgBlock = imgUrl
        ? `<div class="card-img-wrap">
             <img src="${escAttr(imgUrl)}" alt="${escAttr(item.name)}" loading="lazy"
               onerror="this.parentElement.innerHTML='<div class=no-img-icon>🍽️</div>';" />
           </div>`
        : `<div class="card-img-wrap"><div class="no-img-icon">🍽️</div></div>`;
      const oldPrice = item.old ? `<span class="item-old-price">₺${item.old}</span>` : '';
      card.innerHTML = `
        ${imgBlock}
        <div class="card-body">
          <div class="item-name">${escHtml(item.name)}</div>
          <div class="item-footer">
            <div class="price-wrap">${oldPrice}<span class="item-price">₺${item.price}</span></div>
            <button class="add-btn" onclick="addToCart('${escAttr(item.id)}','${escJs(item.name)}',${Number(item.price)})">+</button>
          </div>
        </div>`;
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    container.appendChild(sec);
  });
}

/* ── SEPET ── */
function addToCart(id, name, price) {
  const ex = cart.find(c => c.id === id);
  if (ex) ex.qty++; else cart.push({ id, name, price, qty: 1 });
  updateCartUI();
  const bar = document.getElementById('cart-bar');
  bar.style.transform = 'translateY(-4px)';
  setTimeout(() => { bar.style.transform = ''; }, 200);
}
function changeQty(id, delta) {
  const item = cart.find(c => c.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(c => c.id !== id);
  updateCartUI(); renderCartItems();
}
function updateCartUI() {
  const total = cart.reduce((s,c) => s+c.price*c.qty, 0);
  const count = cart.reduce((s,c) => s+c.qty, 0);
  document.getElementById('cart-count').textContent       = count;
  document.getElementById('cart-bar-total').textContent   = '₺'+total;
  document.getElementById('cart-total-amount').textContent = '₺'+total;
  document.getElementById('cart-bar').style.display = count > 0 ? 'flex' : 'none';
}
function openCart()  { renderCartItems(); document.getElementById('cart-modal').classList.add('open'); }
function closeCart() { document.getElementById('cart-modal').classList.remove('open'); }
document.getElementById('cart-bar').addEventListener('click', openCart);

function renderCartItems() {
  const list = document.getElementById('cart-items-list');
  if (!cart.length) { list.innerHTML = '<p style="text-align:center;color:#aaa;padding:18px 0">Sepet boş</p>'; return; }
  list.innerHTML = cart.map(item => `
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${escHtml(item.name)}</div>
        <div class="cart-item-price">₺${item.price} × ${item.qty} = ₺${item.price*item.qty}</div>
      </div>
      <div class="qty-controls">
        <button class="qty-btn" onclick="changeQty('${escAttr(item.id)}',-1)">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty('${escAttr(item.id)}',1)">+</button>
      </div>
    </div>`).join('');
  updateCartUI();
}

function setType(type, btn) {
  orderType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('masa-row').style.display  = type==='masa'  ? 'block' : 'none';
  document.getElementById('adres-row').style.display = type==='paket' ? 'block' : 'none';
}

async function submitOrder() {
  if (!cart.length) { alert('Sepetiniz boş!'); return; }
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'Gönderiliyor...';
  const payload = {
    client_id: CLIENT_ID, order_type: orderType,
    items: cart.map(c => ({ id:c.id, name:c.name, price:c.price, qty:c.qty })),
    total: cart.reduce((s,c) => s+c.price*c.qty, 0),
    note:  document.getElementById('siparis-not').value.trim(),
    timestamp: new Date().toISOString(), source: 'web_menu',
  };
  if (orderType==='masa') payload.masa_no = document.getElementById('masa-no').value.trim();
  else {
    payload.musteri_ad  = document.getElementById('musteri-ad').value.trim();
    payload.musteri_tel = document.getElementById('musteri-tel').value.trim();
    payload.adres       = document.getElementById('musteri-adres').value.trim();
  }
  try {
    const res = await fetch(CONFIG.ORDER_WEBHOOK, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
    if (!res.ok) throw new Error('HTTP '+res.status);
  } catch(e) { /* demo */ }
  closeCart();
  const msg = orderType==='masa'
    ? `Masa ${payload.masa_no||'?'} siparişiniz alındı.\nAz sonra hazır olacak! 🍲`
    : `Paket siparişiniz alındı!\nEn kısa sürede kapınızda. 🛵`;
  document.getElementById('success-msg').innerHTML = msg.replace('\n','<br/>');
  document.getElementById('success-screen').style.display = 'flex';
  btn.disabled = false; btn.textContent = 'Siparişi Gönder';
}
function resetOrder() {
  cart = []; updateCartUI();
  document.getElementById('success-screen').style.display = 'none';
  ['siparis-not','masa-no','musteri-ad','musteri-tel','musteri-adres'].forEach(id => { const el=document.getElementById(id); if(el) el.value=''; });
}

/* ── SESLİ ── */
function initVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recognition = new SR();
  recognition.lang='tr-TR'; recognition.continuous=false; recognition.interimResults=false;
  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    setVoiceStatus('Duydum: "'+text+'"');
    processVoiceOrder(text.toLowerCase());
  };
  recognition.onerror = () => setVoiceStatus('Anlaşılamadı, tekrar dene');
  recognition.onend = () => {
    document.getElementById('voice-btn').classList.remove('listening');
    setTimeout(() => { document.getElementById('voice-status').style.display='none'; }, 3000);
  };
}
document.getElementById('voice-btn').addEventListener('click', () => {
  if (!recognition) { setVoiceStatus('Tarayıcınız sesi desteklemiyor'); return; }
  document.getElementById('voice-btn').classList.add('listening');
  setVoiceStatus('🎙️ Dinliyorum...');
  try { recognition.start(); } catch(e) { recognition.stop(); setTimeout(()=>recognition.start(),200); }
});
function setVoiceStatus(msg) { const el=document.getElementById('voice-status'); el.textContent=msg; el.style.display='block'; }
function processVoiceOrder(text) {
  let matched = false;
  Object.values(menuData).flat().forEach(item => {
    if (item.active===false) return;
    if (item.name.toLowerCase().split(' ').some(w => w.length>2 && text.includes(w))) {
      addToCart(item.id, item.name, item.price);
      setVoiceStatus('✅ "'+item.name+'" sepete eklendi');
      matched = true;
    }
  });
  if (!matched) setVoiceStatus('❓ Ürün bulunamadı, tekrar dene');
}

function slugify(s) { return s.toLowerCase().replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s').replace(/ı/g,'i').replace(/ö/g,'o').replace(/ç/g,'c').replace(/[^a-z0-9]/g,'-'); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return escHtml(s); }
function escJs(s)   { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }
